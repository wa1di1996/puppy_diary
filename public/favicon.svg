<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#f0b86c"/>
      <stop offset="100%" stop-color="#d4813a"/>
    </radialGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#bg)"/>
  <!-- 左耳 -->
  <ellipse cx="16" cy="14" rx="9" ry="12" fill="#b86828" transform="rotate(-15 16 14)"/>
  <ellipse cx="16" cy="14" rx="6" ry="9" fill="#e9a55a" transform="rotate(-15 16 14)"/>
  <!-- 右耳 -->
  <ellipse cx="48" cy="14" rx="9" ry="12" fill="#b86828" transform="rotate(15 48 14)"/>
  <ellipse cx="48" cy="14" rx="6" ry="9" fill="#e9a55a" transform="rotate(15 48 14)"/>
  <!-- 脸 -->
  <ellipse cx="32" cy="34" rx="20" ry="19" fill="#faf0e0"/>
  <!-- 眼睛 -->
  <ellipse cx="24" cy="30" rx="3.5" ry="4" fill="#2d1f17"/>
  <ellipse cx="40" cy="30" rx="3.5" ry="4" fill="#2d1f17"/>
  <!-- 眼睛高光 -->
  <circle cx="25.2" cy="28.5" r="1.3" fill="#fff"/>
  <circle cx="41.2" cy="28.5" r="1.3" fill="#fff"/>
  <!-- 鼻子 -->
  <ellipse cx="32" cy="38" rx="4" ry="3" fill="#2d1f17"/>
  <!-- 鼻子高光 -->
  <ellipse cx="33" cy="37" rx="1.5" ry="1" fill="#555"/>
  <!-- 嘴巴微笑 -->
  <path d="M27 42 Q32 47 37 42" fill="none" stroke="#2d1f17" stroke-width="1.8" stroke-linecap="round"/>
  <!-- 腮红 -->
  <ellipse cx="19" cy="36" rx="4" ry="2.5" fill="#f5c4a0" opacity="0.6"/>
  <ellipse cx="45" cy="36" rx="4" ry="2.5" fill="#f5c4a0" opacity="0.6"/>
</svg>
