<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="180" fill="#d4813a"/>

  <!-- Dog body / chest -->
  <ellipse cx="512" cy="720" rx="260" ry="200" fill="#faf7f2"/>

  <!-- Dog head -->
  <circle cx="512" cy="420" r="270" fill="#faf7f2"/>

  <!-- Left ear -->
  <ellipse cx="260" cy="300" rx="110" ry="150" fill="#faf7f2" transform="rotate(-20 260 300)"/>
  <ellipse cx="258" cy="298" rx="80" ry="110" fill="#ede6de" transform="rotate(-20 258 298)"/>

  <!-- Right ear -->
  <ellipse cx="764" cy="300" rx="110" ry="150" fill="#faf7f2" transform="rotate(20 764 300)"/>
  <ellipse cx="766" cy="298" rx="80" ry="110" fill="#ede6de" transform="rotate(20 766 298)"/>

  <!-- Face shading -->
  <circle cx="512" cy="460" r="220" fill="#f5f0ea" opacity="0.5"/>

  <!-- Snout -->
  <ellipse cx="512" cy="500" rx="130" ry="100" fill="#f0e8de"/>

  <!-- Nose -->
  <ellipse cx="512" cy="470" rx="50" ry="38" fill="#2d1f17"/>
  <ellipse cx="500" cy="460" rx="12" ry="8" fill="#ffffff" opacity="0.25"/>

  <!-- Mouth -->
  <path d="M 512 508 Q 490 540 465 530" stroke="#2d1f17" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 512 508 Q 534 540 559 530" stroke="#2d1f17" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Left eye -->
  <circle cx="390" cy="380" r="40" fill="#2d1f17"/>
  <circle cx="400" cy="370" r="14" fill="#ffffff" opacity="0.6"/>
  <circle cx="404" cy="366" r="6" fill="#ffffff" opacity="0.8"/>

  <!-- Right eye -->
  <circle cx="634" cy="380" r="40" fill="#2d1f17"/>
  <circle cx="644" cy="370" r="14" fill="#ffffff" opacity="0.6"/>
  <circle cx="648" cy="366" r="6" fill="#ffffff" opacity="0.8"/>

  <!-- Eyebrows -->
  <path d="M 355 330 Q 390 315 420 330" stroke="#d4813a" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M 604 330 Q 634 315 669 330" stroke="#d4813a" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Collar -->
  <rect x="310" y="620" width="404" height="50" rx="25" fill="#d4813a"/>
  <rect x="310" y="620" width="404" height="20" rx="10" fill="#b86828" opacity="0.4"/>

  <!-- Star tag on collar -->
  <polygon points="512,638 522,658 544,658 526,672 532,692 512,680 492,692 498,672 480,658 502,658"
           fill="#faf7f2" stroke="#ede6de" stroke-width="3"/>

  <!-- Blush -->
  <ellipse cx="330" cy="480" rx="50" ry="30" fill="#f5c9a8" opacity="0.5"/>
  <ellipse cx="694" cy="480" rx="50" ry="30" fill="#f5c9a8" opacity="0.5"/>
</svg>
